id: DK-SECRET-001
domain: docker
severity: error
tags: [secrets, credentials, security, env, build-secrets]
triggers: [ENV, ARG, secret, password, "API_KEY"]
when: A build or container needs a credential, token, or key.
rule: >
  Never bake secrets into images. ENV and ARG values, and every
  intermediate layer, are recoverable from image history even if "removed"
  later. Use BuildKit --mount=type=secret at build time and inject runtime
  secrets via the orchestrator's secret store, not the Dockerfile.
violation: "ENV API_KEY=sk-abc123   // baked into the image layer permanently"
correct: "RUN --mount=type=secret,id=api_key ...   // not persisted in any layer"
