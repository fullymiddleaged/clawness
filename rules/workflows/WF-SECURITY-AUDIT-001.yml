id: WF-SECURITY-AUDIT-001
domain: workflows
severity: error
tags: [security, audit, red-team, blue-team, review, penetration, vulnerability]
triggers: [security audit, security review, pen test, vulnerability, harden, red team, blue team, CVE, OWASP]
when: Performing a security review or hardening pass on code.
rule: >
  Run a red team / blue team security audit using sub-agents. First,
  delegate to the security-red-team agent to probe for vulnerabilities
  with current-month CVE awareness. Then delegate the red team report
  to the security-blue-team agent for triage, remediation, and
  hardening. Synthesize both reports into a prioritized action plan.
  Never skip the red team step — a single-pass review misses adversarial
  attack paths.
violation: "Reviewing security as a single checklist pass"
correct: "Red team finds attack vectors, blue team proposes fixes, you prioritize and apply"
