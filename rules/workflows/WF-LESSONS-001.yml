id: WF-LESSONS-001
domain: workflows
severity: info
tags: [memory, lessons, mistake, repeat, frustration, retrospective, journal, learnings]
triggers: [again, keeps happening, every time, same mistake, lesson, remember this, remember that, note for next time, frustrating, you already, stop doing, learned, retrospective, gotcha]
when: The user says to remember something, or a mistake, dead-end, or surprising gotcha recurs.
rule: >
  Persist durable lessons to the project's .clawness/memory.md so they survive
  across sessions. Record immediately when the user explicitly asks you to remember
  something ("remember this", "note for next time"). Otherwise record on the second
  occurrence, not the first: when the same mistake repeats, a correction is given
  again, or a non-obvious gotcha costs real time. Append one terse bullet (newest at
  the bottom) naming the trap and the fix. Read this file's lessons before repeating
  work in an area it covers. Keep entries short, deduplicated, and specific — prune
  ones that no longer hold. Clawness injects this file every turn, so a bloated log
  degrades every prompt.
violation: "Re-discovering the same build flag / API quirk every session because nothing was written down"
correct: "Appending '- vitest needs --run in CI or it hangs watching' to .clawness/memory.md the second time it bit"
