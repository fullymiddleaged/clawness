id: FA-ERROR-001
domain: fastapi
severity: warning
tags: [error, exception, HTTPException, handler, status-code, response]
triggers: [HTTPException, exception, error, status, 404, 400, 422, 500, handler, raise]
when: Handling errors or returning error responses from endpoints.
rule: >
  Raise HTTPException with appropriate status codes and clear detail
  messages. Use custom exception handlers for domain exceptions to
  keep endpoint code clean. Return 404 for missing resources, 400 for
  bad client input, 403 for forbidden, 409 for conflicts. Never return
  200 with an error body. Never expose internal error details (stack
  traces, DB errors) to clients in production.
violation: "return {'error': 'not found'}  # 200 status with error body"
correct: "raise HTTPException(status_code=404, detail='User not found')"
