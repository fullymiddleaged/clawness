id: FA-DBSESSION-001
domain: fastapi
severity: error
tags: [database, session, SQLAlchemy, async, transaction, connection, pool]
triggers: [session, database, SQLAlchemy, AsyncSession, engine, connection, pool, transaction, commit, rollback]
when: Managing database connections and sessions in FastAPI.
rule: >
  Use async SQLAlchemy (AsyncSession + create_async_engine) with
  FastAPI. Provide sessions via a Depends() generator that yields the
  session and handles commit/rollback in a try/finally. Never create
  sessions outside of the request lifecycle. Configure the connection
  pool (pool_size, max_overflow, pool_recycle) for production. Use
  Alembic for migrations.
violation: "Global session object shared across requests — causes race conditions"
correct: "async def get_db(): async with async_session() as s: yield s — with per-request lifecycle"
