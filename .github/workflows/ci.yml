name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest

      - name: Lint rules
        run: python -m clawness.cli --rules-dir ./rules lint

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Benchmark retrieval
        run: python -m clawness.cli --rules-dir ./rules bench

      - name: Retrieval quality (MRR@5 + hit-rate floors)
        run: python -m clawness.cli --rules-dir ./rules eval --floor-mrr 0.85 --floor-hit 0.95
